name: neuroguard
description: NeuroGuard - 24/7 Smart Epilepsy Guardian

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.5.2
  firebase_database: ^11.3.10
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Charts
  fl_chart: ^0.66.2

  # Animations
  lottie: ^3.0.0

  # Google Sign In
  google_sign_in: ^6.2.1

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  vibration: ^3.1.3
  audioplayers: ^6.0.0
  geolocator: ^14.0.2
  permission_handler: ^11.4.0
  flutter_tts: ^4.2.5
  flutter_phone_direct_caller: ^2.2.1
# duplicate url_launcher removed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/sound/
    - assets/sounds/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
